services:
  postgres:
    image: postgres:16
    container_name: wardos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wardos}
      POSTGRES_USER: ${POSTGRES_USER:-wardos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      TZ: America/New_York
    ports:
      - "${POSTGRES_BIND:-127.0.0.1}:5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER:-wardos}\" -d \"$${POSTGRES_DB:-wardos}\""]
      interval: 15s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n
    container_name: wardos_n8n
    restart: unless-stopped
    ports:
      - "${N8N_BIND:-127.0.0.1}:5678:5678"
    environment:
      - GENERIC_TIMEZONE=America/New_York
      - TZ=America/New_York
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE:-false}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-wardos}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-wardos}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - ./data/n8n:/home/node/.n8n
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    container_name: wardos_api
    restart: unless-stopped
    ports:
      - "${API_BIND:-127.0.0.1}:8000:8000"
    volumes:
      - ./data:/app/data
      - ./agents:/app/agents
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()\""]
      interval: 20s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy

  council_meetings_sync:
    build: .
    container_name: wardos_council_meetings_sync
    restart: unless-stopped
    command: ["sh", "scripts/council_meetings_daily.sh"]
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  city_calendar_sync:
    build: .
    container_name: wardos_city_calendar_sync
    restart: unless-stopped
    command: ["sh", "scripts/city_calendar_daily.sh"]
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  city_bulletins_sync:
    build: .
    container_name: wardos_city_bulletins_sync
    restart: unless-stopped
    command: ["sh", "scripts/city_bulletins_daily.sh"]
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  development_watch_sync:
    build: .
    container_name: wardos_development_watch_sync
    restart: unless-stopped
    command: ["sh", "scripts/development_watch_daily.sh"]
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  media_mentions_sync:
    build: .
    container_name: wardos_media_mentions_sync
    restart: unless-stopped
    command: ["sh", "scripts/media_mentions_daily.sh"]
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: nginx:1.27-alpine
    container_name: wardos_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_BIND:-127.0.0.1}:3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ >/dev/null 2>&1"]
      interval: 20s
      timeout: 5s
      retries: 5
    depends_on:
      api:
        condition: service_healthy
